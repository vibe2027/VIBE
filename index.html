<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; color: white; overflow: hidden; background-color: #000; }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* ON UTILISE TON IMAGE DIRECTEMENT ICI */
            background: url('https://raw.githubusercontent.com/vibe2027/VIBE/main/AMBIANCE/fond.png') no-repeat center center;
            background-size: cover;
            filter: brightness(60%);
            z-index: -1;
        }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: rgba(0,0,0,0.2); }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin-bottom: 20px; color: #D4AF37; } /* Or pour fitter avec ton image */
        .city { font-size: 1.2rem; margin: 8px 0; letter-spacing: 3px; text-transform: uppercase; border: 1px solid rgba(212, 175, 55, 0.5); padding: 10px; width: 200px; }
        input { margin-top: 30px; padding: 12px; border: none; border-radius: 2px; width: 220px; text-align: center; background: rgba(255,255,255,0.9); }
        .arrow { margin-top: 20px; font-size: 2.5rem; color: #D4AF37; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="container">
        <h1>VIBE</h1>
        <div class="city">MONTRÉAL</div>
        <div class="city">QUÉBEC</div>
        <div class="city">OTTAWA</div>
        <div class="city">TORONTO</div>
        <input type="text" placeholder="Votre Prénom">
        <div class="arrow">→</div>
    </div>
</body>
</html>
