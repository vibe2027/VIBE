<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* URL SIMPLIFIÉE : C'est la clé pour que ça fonctionne enfin */
            background: url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1600') no-repeat center center;
            background-size: cover;
            filter: brightness(40%);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 { font-size: 3rem; letter-spacing: 5px; margin-bottom: 20px; }
        .city { font-size: 1.5rem; margin: 10px 0; letter-spacing: 2px; }
        
        input {
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 200px;
            text-align: center;
        }

        .arrow { margin-top: 15px; font-size: 2rem; color: blue; }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <h1>VIBE</h1>
        <div class="city">MONTRÉAL</div>
        <div class="city">QUÉBEC</div>
        <div class="city">OTTAWA</div>
        <div class="city">TORONTO</div>
        
        <input type="text" placeholder="Votre Prénom">
        <div class="arrow">→</div>
    </div>

</body>
</html>
