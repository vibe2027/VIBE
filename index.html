<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE | Axe Vanadium</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #111; --ruby: #9b111e; }
        body { background: var(--black); color: var(--gold); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* BARRE DE LANCEMENT & COMPTE À REBOURS */
        .launch-bar { background: linear-gradient(to right, #000, #400, #000); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        #countdown { font-size: 1.8rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--gold); margin: 10px 0; }
        .progress-container { width: 80%; background: #222; height: 12px; border-radius: 6px; margin: 10px auto; border: 1px solid var(--gold); overflow: hidden; }
        #ticket-progress { width: 0%; height: 100%; background: var(--gold); transition: 2s ease-in-out; }

        /* NAVIGATION VILLES */
        nav { display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-bottom: 1px solid #222; }
        nav span { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; color: #555; transition: 0.3s; }
        nav span.active { color: var(--gold); font-weight: bold; }

        /* RADAR (L'APERÇU) */
        .radar-area { height: 40vh; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; }
        .dot { width: 50px; height: 50px; border-radius: 50%; position: absolute; background-size: cover; border: 1px solid var(--gold); filter: blur(15px); transition: 0.5s; }
        
        /* SALLE MIROIR & CHAT */
        .section-title { padding: 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; }
        .mirror-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .visitor img { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #333; filter: blur(10px); }
        
        .btn-pay { background: var(--gold); color: #000; border: none; padding: 18px; width: 90%; margin: 20px 5%; border-radius: 35px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body>

<div class="launch-bar">
    <div style="letter-spacing: 4px; font-size: 0.7rem;">OUVERTURE DU RIDEAU</div>
    <div id="countdown">00d 00h 00m 00s</div>
    <div class="progress-container"><div id="ticket-progress"></div></div>
    <div style="font-size: 0.8rem;">BILLETS CLAN : <span id="tickets-sold">0</span> / 1000</div>
</div>

<nav>
    <span onclick="setCity('MONTREAL')" id="nav-MTL" class="active">MONTREAL</span>
    <span onclick="setCity('QUEBEC')" id="nav-QC">QUEBEC</span>
    <span onclick="setCity('OTTAWA')" id="nav-OTT">OTTAWA</span>
    <span onclick="setCity('TORONTO')" id="nav-TOR">TORONTO</span>
</nav>

<div class="radar-area" id="radar"></div>

<div class="section-title">Aperçu : Qui vous observe ?</div>
<div class="mirror-grid" id="mirror"></div>

<button class="btn-pay" onclick="upgrade()">Réserver mon Billet Clan (299$)</button>

<script>
    // --- CONFIGURATION ---
    const launchDate = new Date("May 1, 2026 00:00:00").getTime();
    let soldTickets = 246; // Change ce chiffre ici chaque jour !
    const totalTickets = 1000;
    let currentCity = "MONTREAL";

    const members = [
        { city: "MONTREAL", pos: [20, 30], img: "https://i.pravatar.cc/100?u=1" },
        { city: "MONTREAL", pos: [60, 50], img: "https://i.pravatar.cc/100?u=2" },
        { city: "TORONTO", pos: [40, 40], img: "https://i.pravatar.cc/100?u=3" },
        { city: "OTTAWA", pos: [50, 20], img: "https://i.pravatar.cc/100?u=4" },
        { city: "QUEBEC", pos: [30, 70], img: "https://i.pravatar.cc/100?u=5" }
    ];

    // --- LOGIQUE COMPTEUR ---
    function updateLaunch() {
        const now = new Date().getTime();
        const diff = launchDate - now;
        
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        
        document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        
        const percent = (soldTickets / totalTickets) * 100;
        document.getElementById("ticket-progress").style.width = percent + "%";
        document.getElementById("tickets-sold").innerText = soldTickets;
    }
    setInterval(updateLaunch, 1000);
    updateLaunch();

    // --- LOGIQUE RADAR ---
    function setCity(city) {
        currentCity = city;
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active'));
        document.getElementById('nav-' + (city === "TORONTO" ? "TOR" : city.substring(0,3))).classList.add('active');
        render();
    }

    function render() {
        const radar = document.getElementById('radar');
        const mirror = document.getElementById('mirror');
        radar.innerHTML = "";
        mirror.innerHTML = "";

        members.filter(m => m.city === currentCity).forEach(m => {
            let d = document.createElement('div');
            d.className = "dot";
            d.style.left = m.pos[0] + "%"; d.style.top = m.pos[1] + "%";
            d.style.backgroundImage = `url(${m.img})`;
            radar.appendChild(d);
        });

        for(let i=0; i<3; i++) {
            mirror.innerHTML += `<div class="visitor"><img src="https://i.pravatar.cc/100?u=${i+10}"></div>`;
        }
    }

    function upgrade() {
        alert("Lien vers Stripe : 299$ pour l'Axe Vanadium.");
        // window.location.href = "TON_LIEN_STRIPE";
    }

    render();
</script>
</body>
</html>
