<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE | Axe Vanadium</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #111; --ruby: #9b111e; }
        body { background: var(--black); color: var(--gold); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* NAVIGATION DES 4 VILLES */
        nav { display: flex; justify-content: space-around; background: #000; padding: 20px 0; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        nav span { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; color: #555; font-weight: bold; transition: 0.3s; }
        nav span.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* RADAR */
        .radar-header { text-align: center; padding: 15px; font-weight: bold; letter-spacing: 4px; border-bottom: 1px solid #222; }
        .radar-area { height: 45vh; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; }
        
        /* POINTS DE PROFIL */
        .dot { width: 55px; height: 55px; border-radius: 50%; position: absolute; background-size: cover; background-position: center; border: 1px solid var(--gold); transition: 0.5s; }
        .blurred { filter: blur(18px); }
        .founder-dot { border: 2px solid var(--ruby) !important; box-shadow: 0 0 20px var(--gold); z-index: 100; }
        .clan-dot { border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* SALLE MIROIR */
        .section-title { padding: 15px 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; background: #000; border-bottom: 1px solid #222; margin-top: 10px; }
        .mirror-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .visitor { text-align: center; font-size: 0.6rem; }
        .visitor img { width: 65px; height: 65px; border-radius: 50%; border: 1px solid #333; margin-bottom: 8px; }

        /* CHAT & TRANSLATE */
        .chat-box { height: 25vh; background: var(--gray); margin: 15px; border-radius: 12px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid #222; }
        .msg { margin-bottom: 15px; font-size: 0.85rem; border-left: 2px solid var(--gold); padding-left: 10px; }
        .trad { color: #fff; font-style: italic; opacity: 0.8; font-size: 0.75rem; margin-top: 4px; display: block; }
        input { background: #222; border: 1px solid var(--gold); color: white; padding: 12px; width: calc(100% - 26px); border-radius: 25px; margin: 0 13px; outline: none; }

        .btn-pay { background: var(--gold); color: #000; border: none; padding: 15px; width: 90%; margin: 20px 5%; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <span onclick="setCity('MONTREAL')" id="nav-MTL" class="active">MONTREAL</span>
    <span onclick="setCity('QUEBEC')" id="nav-QC">QUEBEC</span>
    <span onclick="setCity('OTTAWA')" id="nav-OTT">OTTAWA</span>
    <span onclick="setCity('TORONTO')" id="nav-TOR">TORONTO</span>
</nav>

<div class="radar-header" id="current-hub">HUB: MONTREAL</div>
<div class="radar-area" id="radar"></div>

<div class="section-title">Salle Miroir</div>
<div class="mirror-grid" id="mirror"></div>
<div id="pay-area"></div>

<div class="section-title">Salon Privé - Translate</div>
<div class="chat-box" id="chat"></div>
<input type="text" id="chatInput" placeholder="Écrire un message...">

<script>
    // CONFIGURATION MAÎTRE
    const IS_GOD_MODE = true; // Toi : vision totale
    let userRank = "FREE"; 
    let currentCity = "MONTREAL";

    // Tes données (Simulation)
    const members = [
        { city: "MONTREAL", name: "Toi (Fondateur)", rank: "FOUNDER", img: "https://i.ibb.co/screenshot.jpg", pos: [45, 40] },
        { city: "MONTREAL", name: "Clan_Member", rank: "CLAN", img: "https://via.placeholder.com/100", pos: [20, 60] },
        { city: "TORONTO", name: "TO_Power", rank: "CLAN", img: "https://via.placeholder.com/101", pos: [50, 30] },
        { city: "OTTAWA", name: "Diplomat_X", rank: "CLAN", img: "https://via.placeholder.com/102", pos: [30, 20] },
        { city: "QUEBEC", name: "Capitale_VIP", rank: "FREE", img: "https://via.placeholder.com/103", pos: [70, 50] }
    ];

    function setCity(city) {
        currentCity = city;
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active'));
        document.getElementById('nav-' + (city === "TORONTO" ? "TOR" : city.substring(0,3))).classList.add('active');
        document.getElementById('current-hub').innerText = "HUB: " + city;
        render();
    }

    function render() {
        const radar = document.getElementById('radar');
        const mirror = document.getElementById('mirror');
        const payArea = document.getElementById('pay-area');
        radar.innerHTML = "";
        mirror.innerHTML = "";

        // Radar
        members.filter(m => m.city === currentCity).forEach(m => {
            let d = document.createElement('div');
            d.className = "dot";
            if (m.rank === "FOUNDER") d.classList.add('founder-dot');
            if (m.rank === "CLAN") d.classList.add('clan-dot');
            
            // Logique Brouillard
            if (!IS_GOD_MODE && userRank === "FREE" && m.rank !== "FOUNDER") d.classList.add('blurred');
            
            d.style.left = m.pos[0] + "%";
            d.style.top = m.pos[1] + "%";
            d.style.backgroundImage = `url(${m.img})`;
            radar.appendChild(d);
        });

        // Miroir
        members.slice(1, 4).forEach(m => {
            let isBlurred = (userRank === "FREE" && !IS_GOD_MODE);
            mirror.innerHTML += `
                <div class="visitor">
                    <img src="${m.img}" class="${isBlurred ? 'blurred' : ''}">
                    <p style="color:white; margin-top:5px;">${isBlurred ? 'MEMBRE CLAN' : m.name}</p>
                </div>`;
        });

        // CTA Payant
        if (userRank === "FREE" && !IS_GOD_MODE) {
            payArea.innerHTML = `<button class="btn-pay" onclick="upgrade()">Dissiper le Brouillard (299$)</button>`;
        } else {
            payArea.innerHTML = `<p style="text-align:center; font-size:0.7rem; color:gray; padding:10px;">✓ ACCÈS VANADIUM ACTIVÉ</p>`;
        }
    }

    function upgrade() {
        alert("Redirection vers Stripe... 299$");
        userRank = "CLAN";
        render();
    }

    const input = document.getElementById('chatInput');
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && input.value !== "") {
            const chat = document.getElementById('chat');
            const val = input.value;
            chat.innerHTML += `
                <div class="msg">
                    <strong>Moi:</strong> ${val}
                    <span class="trad">[VIBE Translate: Traduction auto active...]</span>
                </div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    });

    render();
</script>
</body>
</html>
