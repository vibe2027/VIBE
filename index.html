<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V I B E</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: serif; display: flex; justify-content: center; align-items: center; color: white; }
        .container { width: 90%; max-width: 320px; text-align: center; border: 1px solid #333; padding: 25px; border-radius: 30px; background: #0a0a0a; }
        .logo { color: #d4af37; font-size: 24px; letter-spacing: 8px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn { border: 1px solid #fff; padding: 12px; font-size: 11px; cursor: pointer; }
        .btn.active { background: #fff; color: #000; font-weight: bold; }
        input { background: none; border: none; border-bottom: 1px solid #fff; color: #fff; width: 90%; padding: 15px; font-size: 18px; outline: none; text-align: center; margin-bottom: 20px; -webkit-user-select: text; }
        .arrow { color: #d4af37; font-size: 35px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">V I B E</div>
        <div class="grid">
            <div class="btn active" onclick="sel(this)">MONTREAL</div>
            <div class="btn" onclick="sel(this)">QUEBEC</div>
            <div class="btn" onclick="sel(this)">OTTAWA</div>
            <div class="btn" onclick="sel(this)">TORONTO</div>
        </div>
        <input type="text" placeholder="Votre Prénom" id="name">
        <a href="https://www.tiktok.com/@vibe2027" class="arrow">→</a>
    </div>
    <script>
        function sel(e) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            e.classList.add('active');
        }
    </script>
</body>
</html>
